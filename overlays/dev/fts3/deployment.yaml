apiVersion: apps/v1
kind: Deployment
metadata:
  name: fts3
  labels:
    app: fts3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fts3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: fts3
    spec:
      volumes:
        - name: fts3-configs
          secret:
            defaultMode: 420
            secretName: fts3-configs
        - name: fts3-host-pems
          secret:
            defaultMode: 420
            secretName: fts3-host-pems
        - name: sdf-group-rubin
          persistentVolumeClaim:
            claimName: sdf-group-rubin
        - name: fts3-logs
          persistentVolumeClaim:
            claimName: fts3-logs-pvc
        - name: supervisord-conf
          configMap:
            name: supervisord-conf
      restartPolicy: Always
      initContainers:
      - name: prep-log-pvc
        image: ghcr.io/fnal-fife/fts3-al9:3.14.2
        imagePullPolicy: Always
        command: ["/bin/sh", "-c", "cp -r /var/log/* /out/"]
        volumeMounts:
          - name: fts3-logs
            mountPath: /out/
      containers:
        - name: fts3
          image: ghcr.io/fnal-fife/fts3-server:3.14.4-s6
          imagePullPolicy: Always
          resources:
            limits:
              cpu: 4000m
              memory: 20Gi
            requests:
              cpu: 2000m
              memory: 20Gi
          volumeMounts:
            - name: fts3-configs
              mountPath: /opt/fts3/fts3-configs
              readOnly: true
            - name: fts3-host-pems
              mountPath: /opt/fts3/fts3-host-pems
              readOnly: true
            - name: sdf-group-rubin
              mountPath: /etc/grid-security/certificates
              subPath: services/ddm/etc/grid-security/certificates
              readOnly: true
            - name: fts3-logs
              mountPath: /var/log
            - name: supervisord-conf
              mountPath: /etc/supervisord.conf
              subPath: supervisord.conf
          env:
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: fts3-db
                  key: username
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fts3-db
                  key: password
            - name: MARIADB_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: fts3-db
                  key: conn-str
            - name: FTS3_MARIADB_NAME
              valueFrom:
                secretKeyRef:
                  name: fts3-db
                  key: db-name
            #- name: FTS3_BROKER_PASSWORD
            #  valueFrom:
            #    secretKeyRef:
            #      name: fts3-activemq-secrets
            #      key: broker_password
            #- name: FTS3_BROKER_USERNAME
            #  valueFrom:
            #    secretKeyRef:
            #      name: fts3-activemq-secrets
            #      key: broker_username
            #- name: BROKER_DNS_ALIAS
            #  valueFrom:
            #    secretKeyRef:
            #      name: fts3-activemq-secrets
            #      key: broker_dns_alias
            #- name: STOMP_PORT
            #  value: "61613"
            #- name: WEB_INTERFACE
            #  value: usdf-fts3-dev.slac.stanford.edu
            #- name: DATABASE_UPGRADE
            #  value: "yes"
          readinessProbe:
            exec:
              command:
              - /bin/sh
              - -i
              - -c
              - mysql --host=${MARIADB_CONNECTION_STRING} -P 3306 --user=$MARIADB_USER --password="$MARIADB_PASSWORD" --database=fts3db -e 'SELECT 1'
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
