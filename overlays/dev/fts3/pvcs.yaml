apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grid-certificates-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fts3-logs-pvc
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 250Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sdf-group-rubin
spec:
  storageClassName: sdf-group-rubin
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 1Gi
